services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diplom-app
    command: ["./diplom", "server"]
    environment:
      APP_ADDRESS: ":8080"
      APP_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/diplom?sslmode=disable"
      APP_REDIS_ENABLED: "true"
      APP_REDIS_ADDR: "redis:6379"
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: diplom-postgres
    environment:
      POSTGRES_DB: diplom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: diplom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
