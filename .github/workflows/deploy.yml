name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, ARM64]
    defaults:
      run:
        shell: bash
        working-directory: /root/diplom

    steps:
      - name: Ensure deploy directory exists
        run: |
          if [ ! -d /root/diplom ]; then
            echo "Deploy directory /root/diplom does not exist." >&2
            exit 1
          fi

      - name: Update repository
        run: |
          git fetch origin master
          git reset --hard origin/master

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: /root/diplom/go.mod
          cache: false

      - name: Run tests
        run: go test ./...

      - name: Ensure environment file exists
        run: |
          if [ ! -f .env ]; then
            echo ".env file is missing in /root/diplom. Create it on the server before deploy." >&2
            exit 1
          fi

      - name: Deploy containers
        run: docker compose up -d --build --remove-orphans

      - name: Show container status
        run: docker compose ps
